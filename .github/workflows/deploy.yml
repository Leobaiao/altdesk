name: Deploy AltDesk to Locaweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Generate .env file locally
        run: |
          cat > .env.prod <<'ENVFILE'
          MSSQL_SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}
          DB_USER=sa
          DB_NAME=AltDeskDev
          DB_HOST=db
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ASAAS_API_KEY=${{ secrets.ASAAS_API_KEY }}
          ASAAS_ENV=production
          ASAAS_WEBHOOK_TOKEN=${{ secrets.ASAAS_WEBHOOK_TOKEN }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          VITE_API_URL_APP=https://api.altdesk.com.br
          VITE_API_URL_ADMIN=https://api-admin.altdesk.com.br
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_SECURE=false
          ENVFILE
          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' .env.prod

      - name: Upload .env to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -o StrictHostKeyChecking=no .env.prod $SSH_USER@$SSH_HOST:/opt/altdesk/.env

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
            set -e
            cd /opt/altdesk
            
            # Atualiza o código
            git pull origin main
            
            # Build e Restart
            docker compose -f deploy/docker-compose.prod.yml up -d --build
          EOF
