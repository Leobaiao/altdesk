name: Deploy AltDesk to Locaweb

on:
  push:
    branches: [main, development]

jobs:
  # 1. Verificação de Integridade (Build)
  build_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Backend
        run: |
          cd backend
          npm install
          npm run build

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

  # 2. Deploy para Produção
  deploy:
    needs: build_check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Configure known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Debug Secrets Values
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "=== SSH_HOST length: $(echo -n "$SSH_HOST" | wc -c) ==="
          echo "=== SSH_HOST hex ===" 
          echo -n "$SSH_HOST" | xxd | head -2
          echo "=== SSH_USER length: $(echo -n "$SSH_USER" | wc -c) ==="
          echo "=== SSH_USER hex ==="
          echo -n "$SSH_USER" | xxd | head -2
          echo "=== Agent keys loaded ==="
          ssh-add -l
          echo "=== Resolving host ==="
          getent hosts 191.252.110.173 || echo "getent failed"
          echo "=== Direct ping test ==="
          ping -c 1 -W 3 191.252.110.173 || echo "ping failed"

      - name: Test SSH with hardcoded values
        run: |
          ssh -vvv -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=accept-new \
            -o PasswordAuthentication=no \
            deploy@191.252.110.173 "echo 'SSH connection successful'"


      - name: Generate .env file locally
        run: |
          cat <<EOF > .env.prod
          MSSQL_SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}
          DB_USER=sa
          DB_NAME=AltDeskDev
          DB_HOST=db
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ASAAS_API_KEY=${{ secrets.ASAAS_API_KEY }}
          ASAAS_ENV=production
          ASAAS_WEBHOOK_TOKEN=${{ secrets.ASAAS_WEBHOOK_TOKEN }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          VITE_API_URL_APP=https://api.altdesk.com.br
          VITE_API_URL_ADMIN=https://api-admin.altdesk.com.br
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_SECURE=false
          EOF
          # Garante que não existam espaços acidentais no início das linhas
          sed -i 's/^[[:space:]]*//' .env.prod

      - name: Upload .env to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new .env.prod $SSH_USER@$SSH_HOST:/opt/altdesk/.env

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new $SSH_USER@$SSH_HOST << 'EOF'
            set -e
            cd /opt/altdesk
            git pull origin main
            docker compose -f deploy/docker-compose.prod.yml up -d --build
            
            # Limpeza de imagens órfãs para poupar espaço no disco da Locaweb
            docker image prune -f
          EOF






