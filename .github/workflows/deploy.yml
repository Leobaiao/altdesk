name: Deploy AltDesk to Locaweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Generate .env file locally
        run: |
          cat > .env.prod <<'ENVFILE'
          MSSQL_SA_PASSWORD=Intamr17@
          DB_USER=sa
          DB_NAME=AltDeskDev
          DB_HOST=db
          JWT_SECRET=Intamr17@
          ASAAS_API_KEY=$$aact_hmlg_000MzkwODA2MWY2OGM3MWRlMDU2NWM3MzJlNzZmNGZhZGY6OjZjNDE0NDhjLWIyZDItNDdmZS05NTFhLWU3M2RmNTY5NzM2MTo6$$aach_f14afb44-c289-4928-8763-9fd129714581
          ASAAS_ENV=production
          ASAAS_WEBHOOK_TOKEN=whsec__cXurBkYmEnMdZ9CLaPXRshm__hGcsHsuB8p1Hlyr5w
          ALLOWED_ORIGINS=https://altdesk.com.br,https://admin.altdesk.com.br
          ENCRYPTION_KEY=0598f8ee7bda2b537fbefeceb01c2db8e18cd4a1f10c2b108b729f274824e4d2
          VITE_API_URL_APP=https://api.altdesk.com.br
          VITE_API_URL_ADMIN=https://api-admin.altdesk.com.br
          SMTP_HOST=
          SMTP_PORT=
          SMTP_USER=
          SMTP_PASS=
          SMTP_SECURE=false
          ENVFILE
          sed -i 's/^          //' .env.prod

      - name: Upload .env to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -o StrictHostKeyChecking=no .env.prod $SSH_USER@$SSH_HOST:/opt/altdesk/.env

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
            set -e
            cd /opt/altdesk
            git pull origin main
            docker compose -f deploy/docker-compose.prod.yml up -d --build
          EOF
