services:
  # Banco de Dados (SQL Server)
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: altdesk_db_prod
    user: root
    environment:
      - ACCEPT_EULA=Y
    env_file:
      - ../.env
    volumes:
      - mssql_data_prod:/var/opt/mssql
      - ../backend/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash -c ': > /dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always
    networks:
      - internal

  # Migrador do Banco (Apenas roda quando solicitado ou atualizado)
  db-migrate:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: altdesk_migrate_prod
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend/db:/scripts
    env_file:
      - ../.env
    entrypoint: >
      /bin/bash -c "
        echo 'Runing script for SQL Server migrations in PROD...';
        echo 'Step 1: Creating database and tables...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d master -i /scripts/01-init.sql;
        echo 'Step 2: Inserting seed data...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/02-seed.sql;
        echo 'Step 3: Running migrations...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/03-migration-roles-cpf-audit.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/04-fix-user-displayname.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/05-migration-subscription-fields.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/06-password-reset.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/07-billing-and-service-desk.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/08-trash-system.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/08-billing-checkout.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/09-onboarding.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/10-instance-assignment.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/11-cpf-sessions.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/12-soft-delete-conversations.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/13-tenant-status-and-tags.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/14-sp-purge-demo-data.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/15-missing-features-fields.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/16-permissions-and-nomenclature.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/17-soft-delete-sync.sql;
        echo 'Executando migration 18 (email channel)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/18-email-channel.sql;
        echo 'Executando migration 19 (email integration robust)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/19-email-integration.sql;
        echo 'Executando migration 20 (add contextdata)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/20-add-contextdata.sql;
        echo 'Executando migration 21 (kanban sla)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/21-kanban-sla.sql;
        echo 'Executando migration 30 (collaborators and portal)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/30-collaborators-and-portal.sql;
        echo 'Executando migration 31 (requester portal seed)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/31-requester-portal-seed.sql;
        echo 'Executando migration 32 (add sender userid)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/32-add-sender-userid.sql;
        echo 'Executando migration 33 (fix ticketevent tenantid)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/33-fix-ticketevent-tenantid.sql;
        echo 'Executando migration 34 (enterprise refinement)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/34-enterprise-refinement.sql;
        echo 'Executando migration 35 (enterprise refinement v2)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/35-enterprise-refinement-v2.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/36-refine-purge-procedure.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/36-sp-purge-advanced.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/37-add-contact-tracking-fields.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/38-reports-indexes.sql;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/39-help-articles.sql;
        echo 'Executando migration 40 (ticket resolution description)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/40-ticket-resolution.sql;
        echo 'Executando migration 41 (grace period)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/41-grace-period.sql;
        echo 'Executando migration 41 (performance indexes)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/41-performance-indexes.sql;
        echo 'Executando migration 42 (default sla policies)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/42-default-sla-policies.sql;
        echo 'Executando migration 43 (indexes)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/43-indexes.sql;
        echo 'Executando migration 44 (billing plan fields)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/44-billing-plan-fields.sql;
        echo 'Executando migration 45 (system settings)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/45-system-settings.sql;
        echo 'Executando migration 46 (billing plan features)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$${MSSQL_SA_PASSWORD}" -C -d AltDeskDev -i /scripts/46-billing-plan-features.sql;
        echo 'Todas as migrations concluidas em PROD!';
      "
    networks:
      - internal

  # ─── Caddy (Proxy Reverso + HTTPS Automático) ───
  caddy:
    image: caddy:2-alpine
    container_name: altdesk_caddy
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./static:/var/www/static:ro          # Página "Em construção" (altdesk.com.br)
      - caddy_data:/data        # Certificados Let's Encrypt
      - caddy_config:/config    # Configuração interna do Caddy
    depends_on:
      - backend
      - frontend
      - admin-backend
      - admin-frontend
    networks:
      - internal

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: altdesk_api_prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env # Usar um .env central para produção
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: db
    expose:
      - "3002"
    volumes:
      - altdesk_uploads:/app/backend/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - internal

  # Frontend Web Cliente (App)
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL_APP}
    container_name: altdesk_web_prod
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    restart: always
    networks:
      - internal

  # Admin Backend
  admin-backend:
    build:
      context: ..
      dockerfile: admin/backend/Dockerfile
    container_name: altdesk_admin_api_prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: db
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: always
    networks:
      - internal

  # Admin Frontend Web
  admin-frontend:
    build:
      context: ..
      dockerfile: admin/frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL_ADMIN}
    container_name: altdesk_admin_web_prod
    depends_on:
      admin-backend:
        condition: service_healthy
    expose:
      - "80"
    restart: always
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mssql_data_prod:
  caddy_data:
  caddy_config:
  altdesk_uploads:
