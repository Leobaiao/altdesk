# ═══════════════════════════════════════════════════
# AltDesk — Configuração do Nginx (Host Locaweb)
# Caminho sugerido no servidor: /etc/nginx/sites-available/altdesk
# Lembre-se de criar o symlink: 
# ln -s /etc/nginx/sites-available/altdesk /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════

# Redirecionamento genérico HTTP para HTTPS (O Certbot vai adicionar isso depois, mas deixamos preparado)
server {
    listen 80 default_server;
    server_name _;
    
    # Certbot precisa desse block para a validação ACME
    location ~ /\.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── FRONTEND (App Cliente) ───
server {
    listen 80;
    server_name altdesk.com.br; # <<-- DOMÍNIO DE APP CLIENTE

    # Proxy para o container "frontend"
    location / {
        proxy_pass http://127.0.0.1:3000; # Porta exposta do container do frontend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── FRONTEND (SuperAdmin) ───
server {
    listen 80;
    server_name admin.altdesk.com.br; # <<-- DOMÍNIO DE SUPERADMIN

    # Proxy para o container "admin-frontend"
    location / {
        proxy_pass http://127.0.0.1:3001; # Porta exposta do container do admin-frontend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Se for usar domínios separados em vez de subdomínios, basta trocar o server_name acima.
# Depois de configurar esse arquivo e rodar os containers, basta executar:
# sudo certbot --nginx -d altdesk.com.br -d admin.altdesk.com.br -d api.altdesk.com.br -d api-admin.altdesk.com.br
