services:
  # Banco de Dados
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: altdesk_db
    user: root
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:?Defina MSSQL_SA_PASSWORD no .env}
    ports:
      - "14333:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./backend/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: always

  # Migração do Banco (executa e encerra)
  db-migrate:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: altdesk_migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/db:/scripts
    environment:
      - SA_PASSWORD=${MSSQL_SA_PASSWORD:?Defina MSSQL_SA_PASSWORD no .env}
    entrypoint: >
      /bin/bash -c "
        echo 'SQL Server healthy, executando migrations...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/03-migration-roles-cpf-audit.sql;
        echo 'Executando migration 04 (fix displayname)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/04-fix-user-displayname.sql;
        echo 'Executando migration 05 (subscription PlanCode/StartsAt)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/05-migration-subscription-fields.sql;
        echo 'Executando migration 06 (password reset)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/06-password-reset.sql;
        echo 'Executando migration 07 (billing and service desk)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/07-billing-and-service-desk.sql;
        echo 'Executando migration 08 (trash system)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/08-trash-system.sql;
        echo 'Executando migration 09 (onboarding)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/09-onboarding.sql;
        echo 'Executando migration 11 (cpf sessions)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/11-cpf-sessions.sql;
        echo 'Executando migration 13 (tenant status and tags)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/13-tenant-status-and-tags.sql;
        echo 'Executando migration 14 (sp purge demo data)...';
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -d AltDeskDev -i /scripts/14-sp-purge-demo-data.sql;
        echo 'Todas as migrations concluidas!';
      "

  # Backend (API)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: altdesk_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      PORT: 3002
      DB_USER: ${DB_USER:-sa}
      DB_PASS: ${MSSQL_SA_PASSWORD:?Defina MSSQL_SA_PASSWORD no .env}
      DB_NAME: ${DB_NAME:-AltDeskDev}
      DB_HOST: db
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
    ports:
      - "3002:3002"
    restart: always

  # Frontend (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=
    container_name: altdesk_web
    depends_on:
      - backend
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for production HTTPS
    # volumes:
    #   - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certs for HTTPS
    restart: always

  # Admin Backend (Gestão de Empresas)
  admin-backend:
    build:
      context: .
      dockerfile: admin/backend/Dockerfile
    container_name: altdesk_admin_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3002
      DB_USER: ${DB_USER:-sa}
      DB_PASS: ${MSSQL_SA_PASSWORD:?Defina MSSQL_SA_PASSWORD no .env}
      DB_NAME: ${DB_NAME:-AltDeskDev}
      DB_HOST: db
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
    ports:
      - "3003:3002"
    restart: always

  # Admin Frontend (Painel SuperAdmin)
  admin-frontend:
    build:
      context: .
      dockerfile: admin/frontend/Dockerfile
      args:
        - VITE_API_URL=
    container_name: altdesk_admin_web
    depends_on:
      - admin-backend
    ports:
      - "8080:80"
      # - "8443:443"  # Uncomment for production HTTPS
    # volumes:
    #   - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certs for HTTPS
    restart: always

volumes:
  mssql_data:
